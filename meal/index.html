<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8720C">
<link rel="manifest" href="manifest.json">
<title>Finn's Meal Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: #E8720C;
    padding: 18px 16px 14px;
    text-align: center;
  }

  header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
  header p { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin-top: 2px; }

  .btn-generate {
    display: block;
    width: calc(100% - 32px);
    margin: 20px auto 0;
    padding: 16px;
    background: #E8720C;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-generate:active { background: #c45e08; }

  #plan { padding: 16px; display: none; }

  .day-card {
    background: #252525;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .day-header {
    background: #2e2e2e;
    padding: 10px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #E8720C;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .meal-row {
    padding: 10px 14px;
    border-bottom: 1px solid #2e2e2e;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .meal-row:last-child { border-bottom: none; }

  .meal-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 60px;
    padding-top: 2px;
  }

  .meal-text {
    font-size: 0.9rem;
    color: #f0f0f0;
    line-height: 1.4;
    flex: 1;
  }

  .lunch-sides {
    font-size: 0.78rem;
    color: #aaa;
    margin-top: 4px;
  }

  .work-tag {
    display: inline-block;
    background: #333;
    color: #aaa;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .meal-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .swap-btn, .shop-btn {
    background: none;
    border: 1px solid #444;
    color: #888;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .swap-btn:active { background: #333; color: #E8720C; border-color: #E8720C; }
  .shop-btn:active { background: #333; color: #5cb85c; border-color: #5cb85c; }

  .added-flash {
    font-size: 0.7rem;
    color: #5cb85c;
    display: none;
    margin-top: 4px;
  }

  .btn-copy {
    display: block;
    width: calc(100% - 32px);
    margin: 4px auto 0;
    padding: 14px;
    background: #2e2e2e;
    color: #E8720C;
    font-size: 1rem;
    font-weight: 700;
    border: 2px solid #E8720C;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy:active { background: #3a3a3a; }

  .copied-msg {
    text-align: center;
    color: #5cb85c;
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
  }

  .note {
    text-align: center;
    color: #666;
    font-size: 0.75rem;
    margin-top: 16px;
    padding: 0 16px;
  }

  /* Shopping List */
  #shopping-section {
    margin: 0 16px;
    display: none;
  }

  .shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }

  .shop-title {
    font-size: 1rem;
    font-weight: 700;
    color: #E8720C;
    flex: 1;
  }

  .shop-actions {
    display: flex;
    gap: 6px;
  }

  .btn-clear, .btn-copy-list {
    background: none;
    border: 1px solid #555;
    color: #888;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-clear:active { color: #e05555; border-color: #e05555; }
  .btn-copy-list:active { color: #E8720C; border-color: #E8720C; }

  .shop-card {
    background: #252525;
    border-radius: 12px;
    overflow: hidden;
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid #2e2e2e;
    cursor: pointer;
  }
  .shop-item:last-child { border-bottom: none; }
  .shop-item.checked { opacity: 0.4; }

  .shop-check {
    width: 20px;
    height: 20px;
    border: 2px solid #555;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #5cb85c;
  }
  .shop-item.checked .shop-check {
    background: #5cb85c;
    border-color: #5cb85c;
  }

  .shop-item-name {
    font-size: 0.95rem;
    flex: 1;
  }
  .shop-item.checked .shop-item-name {
    text-decoration: line-through;
    color: #666;
  }

  .divider {
    height: 1px;
    background: #2e2e2e;
    margin: 20px 16px 16px;
  }

  .saved-badge {
    text-align: center;
    color: #555;
    font-size: 0.72rem;
    margin-top: 8px;
    padding: 0 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🍽 Finn's Meal Planner</h1>
  <p>Low carb · High protein · Heart healthy</p>
</header>

<button class="btn-generate" onclick="generate()">Generate This Week's Meals</button>

<div id="plan"></div>

<div id="shopping-section">
  <div class="divider"></div>
  <div class="shop-header">
    <span class="shop-title">🛒 Shopping List</span>
    <div class="shop-actions">
      <button class="btn-copy-list" onclick="copyList()">📋 Copy</button>
      <button class="btn-clear" onclick="clearChecked()">Clear checked</button>
      <button class="btn-clear" onclick="clearList()">Clear all</button>
    </div>
  </div>
  <div class="shop-card" id="shop-list"></div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WORK_DAYS = [0,1,2,3,4];

const BREAKFAST = [
  { m: 'Scrambled eggs (x4) + turkey bacon + avocado', i: ['Eggs','Turkey bacon','Avocados'] },
  { m: 'Eggs any style + turkey bacon + berries on the side', i: ['Eggs','Turkey bacon','Berries'] },
  { m: 'Egg & cheese sandwich on 1 slice toast + fruit', i: ['Eggs','Cheese','Bread','Fruit'] },
  { m: 'Smoked salmon + scrambled eggs + avocado', i: ['Smoked salmon','Eggs','Avocados'] },
  { m: 'Veggie scramble: eggs + spinach + bell peppers + cheese', i: ['Eggs','Spinach','Bell peppers','Cheese'] },
  { m: 'Breakfast burrito: eggs + cheese + turkey bacon in tortilla', i: ['Eggs','Cheese','Turkey bacon','Flour tortillas'] },
  { m: 'Hard boiled eggs (x3) + turkey bacon + berries', i: ['Eggs','Turkey bacon','Berries'] },
  { m: 'Greek yogurt (plain) + mixed nuts + berries — no granola', i: ['Greek yogurt','Mixed nuts','Berries'] },
  { m: 'Smoked salmon + cream cheese + cucumber slices on 1 slice rye', i: ['Smoked salmon','Cream cheese','Cucumber','Rye bread'] },
  { m: 'Egg white omelette: egg whites + cheese + spinach + turkey', i: ['Eggs','Cheese','Spinach','Deli turkey'] },
  { m: 'Sardines or tuna on 1 slice toast + sliced tomato', i: ['Canned sardines','Bread','Tomato'] },
];

const WORK_LUNCH = [
  { m: 'Grilled chicken breast (~8oz) — cold is fine', i: ['Chicken breast'] },
  { m: 'Hamburger patty — pack with bun or wrap', i: ['Ground beef','Burger buns'] },
  { m: 'Pinwheel wrap: chicken + cheese + honey mustard or mayo — slice into rounds', i: ['Chicken breast','Cheese','Honey mustard','Mayo','Flour tortillas'] },
  { m: 'Pinwheel wrap: turkey + cheese + honey mustard or mayo — slice into rounds', i: ['Deli turkey','Cheese','Honey mustard','Mayo','Flour tortillas'] },
  { m: 'Pinwheel wrap: chicken salad (shredded chicken + mayo) + cheese — slice into rounds', i: ['Chicken breast','Mayo','Cheese','Flour tortillas'] },
  { m: 'Nachos container: baked chips + seasoned ground beef + cheese + sour cream', i: ['Tortilla chips','Ground beef','Cheese','Sour cream'] },
  { m: 'Chicken sandwich: grilled chicken + cheese + honey mustard or mayo on a roll', i: ['Chicken breast','Cheese','Honey mustard','Mayo','Hoagie rolls'] },
  { m: 'Turkey club: turkey + cheese + bacon + mayo on toasted bread', i: ['Deli turkey','Cheese','Bacon','Mayo','Bread'] },
  { m: 'Steak sandwich: thin sliced steak + cheese + honey mustard or mayo on hoagie', i: ['Steak','Cheese','Honey mustard','Mayo','Hoagie rolls'] },
  { m: 'BLT: bacon + tomato + mayo on toasted bread', i: ['Bacon','Tomato','Mayo','Bread'] },
  { m: 'Grilled cheese + deli turkey on the side', i: ['Bread','Cheese','Butter','Deli turkey'] },
  { m: 'Chicken quesadilla — slice into wedges, cold is fine', i: ['Chicken breast','Cheese','Flour tortillas'] },
  { m: 'Tuna melt sandwich: tuna + mayo + cheese on toasted bread', i: ['Canned tuna','Mayo','Cheese','Bread'] },
  { m: 'BBQ chicken sandwich: grilled chicken + BBQ sauce + cheese on a roll', i: ['Chicken breast','BBQ sauce','Cheese','Burger buns'] },
  { m: 'Chicken caesar wrap: chicken + cheese + caesar dressing in tortilla', i: ['Chicken breast','Cheese','Caesar dressing','Flour tortillas'] },
  { m: 'Crackers + cheese + sliced ham + honey drizzle — pack in a container', i: ['Crackers','Cheese','Sliced ham','Honey'] },
  { m: 'Ham and cheese croissant', i: ['Croissants','Sliced ham','Cheese'] },
  { m: 'Pepperoni + cheese + crackers — mini lunchable style', i: ['Pepperoni','Cheese','Crackers'] },
  { m: 'Chicken strip wrap: chicken tenders + honey mustard or mayo in tortilla', i: ['Chicken tenders','Honey mustard','Mayo','Flour tortillas'] },
  { m: 'Egg salad sandwich: hard boiled eggs + mayo on bread', i: ['Eggs','Mayo','Bread'] },
  { m: 'Cucumber + cream cheese + smoked salmon roll-ups', i: ['Cucumber','Cream cheese','Smoked salmon'] },
];

const WORK_SIDES = 'Sides: Greek yogurt (plain) + berries + carrots + celery + hard boiled egg + mixed nuts';

const DINNER = [
  { m: 'Steak + roasted broccoli + cauliflower rice', i: ['Steak','Broccoli','Cauliflower'] },
  { m: 'Baked salmon + asparagus + cauliflower rice', i: ['Salmon','Asparagus','Cauliflower'] },
  { m: 'Ground beef stir fry over cauliflower rice — soy sauce, garlic, peppers', i: ['Ground beef','Cauliflower','Soy sauce','Bell peppers','Garlic'] },
  { m: 'Teriyaki chicken + steamed broccoli + cauliflower rice', i: ['Chicken breast','Cauliflower','Broccoli','Teriyaki sauce'] },
  { m: 'Garlic butter shrimp + zucchini noodles or cauliflower rice', i: ['Shrimp','Zucchini','Butter','Garlic'] },
  { m: 'Baked chicken thighs + green beans + cauliflower rice', i: ['Chicken thighs','Green beans','Cauliflower'] },
  { m: 'Homemade burgers (lettuce wrap or 1 bun) + side salad', i: ['Ground beef','Lettuce','Cheese','Tomato'] },
  { m: 'Lemon butter salmon + roasted asparagus', i: ['Salmon','Asparagus','Butter','Lemon'] },
  { m: 'Beef tacos: ground beef + cheese + sour cream + corn tortillas (2 max)', i: ['Ground beef','Corn tortillas','Cheese','Sour cream'] },
  { m: 'Smash burgers (no fries) + side salad or roasted veggies', i: ['Ground beef','Burger buns','Cheese','Lettuce','Tomato'] },
  { m: 'Garlic chicken + roasted Brussels sprouts + cauliflower rice', i: ['Chicken breast','Brussels sprouts','Cauliflower','Garlic'] },
  { m: 'Beef stir fry + cauliflower rice — soy sauce, sesame, veggies', i: ['Beef','Cauliflower','Soy sauce','Bell peppers'] },
  { m: 'Chicken fajita bowl: chicken + peppers + onion + cheese + sour cream — no tortilla', i: ['Chicken breast','Bell peppers','Onion','Cheese','Sour cream','Fajita seasoning'] },
  { m: 'Baked fish + roasted green beans + cauliflower rice', i: ['White fish fillets','Green beans','Cauliflower','Butter'] },
  { m: 'Chicken wings (baked) + celery + side salad', i: ['Chicken wings','Celery'] },
  { m: 'Breakfast for dinner: eggs + turkey bacon + avocado', i: ['Eggs','Turkey bacon','Avocados'] },
  { m: 'Ground beef chili — beef + beans + tomato + seasoning, batch cook friendly', i: ['Ground beef','Canned beans','Canned tomatoes','Chili seasoning'] },
  { m: 'Pan seared salmon + spinach sauteed in garlic butter', i: ['Salmon','Spinach','Butter','Garlic'] },
  { m: 'Coconut milk chicken + cauliflower rice — simmer chicken in coconut milk with seasoning', i: ['Chicken breast','Coconut milk','Cauliflower'] },
  { m: 'Shrimp + roasted broccoli + cauliflower rice — garlic butter', i: ['Shrimp','Broccoli','Cauliflower','Butter','Garlic'] },
  { m: 'Stuffed peppers: ground beef + cheese + tomato sauce inside bell peppers', i: ['Ground beef','Bell peppers','Cheese','Pasta sauce'] },
  { m: 'Tuna steaks seared in butter + roasted asparagus', i: ['Tuna steaks','Asparagus','Butter','Lemon'] },
  { m: 'Chicken thighs braised in tomato + olives + garlic — Mediterranean style', i: ['Chicken thighs','Canned tomatoes','Olives','Garlic'] },
];

const WEEKEND_LUNCH = [
  { m: 'Homemade burgers + cheese + side salad (no fries)', i: ['Ground beef','Burger buns','Cheese','Lettuce','Tomato'] },
  { m: 'Ground beef stir fry over cauliflower rice', i: ['Ground beef','Cauliflower','Soy sauce','Bell peppers'] },
  { m: 'Grilled chicken + roasted veggies', i: ['Chicken breast','Broccoli','Bell peppers'] },
  { m: 'Taco bowl: ground beef + cheese + sour cream — cauliflower rice, no chips', i: ['Ground beef','Cauliflower','Cheese','Sour cream'] },
  { m: 'Beef tacos: ground beef + cheese + sour cream + corn tortillas (2 max)', i: ['Ground beef','Corn tortillas','Cheese','Sour cream'] },
  { m: 'Grilled chicken thighs + green beans', i: ['Chicken thighs','Green beans','Garlic'] },
  { m: 'Tuna salad on 1 slice toast or lettuce wraps', i: ['Canned tuna','Mayo','Lettuce','Bread'] },
  { m: 'Quesadillas: chicken + cheese (1 tortilla, keep it small) + side salad', i: ['Chicken breast','Cheese','Flour tortillas','Lettuce'] },
  { m: 'Chicken bowl: chicken + cauliflower rice + cheese + sour cream', i: ['Chicken breast','Cauliflower','Cheese','Sour cream'] },
  { m: 'Salmon + cucumber salad with olive oil + dill', i: ['Salmon','Cucumber','Olive oil'] },
];

let currentPlan = [];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickUnique(arr, count) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  const result = [];
  for (let i = 0; i < count; i++) result.push(shuffled[i % shuffled.length]);
  return result;
}

// ── Plan persistence ──────────────────────────────────────
function savePlan() {
  localStorage.setItem('meal_plan', JSON.stringify(currentPlan));
}

function loadSavedPlan() {
  try { return JSON.parse(localStorage.getItem('meal_plan') || 'null'); } catch { return null; }
}

// ── Render plan from currentPlan ─────────────────────────
function renderPlan() {
  const planEl = document.getElementById('plan');
  planEl.style.display = 'block';

  let html = '';

  DAYS.forEach((day, i) => {
    const { breakfast, lunch, dinner, isWork } = currentPlan[i];
    html += `
      <div class="day-card">
        <div class="day-header">${day}</div>
        <div class="meal-row">
          <span class="meal-label">Breakfast</span>
          <div style="flex:1">
            <div class="meal-text" id="meal-${i}-breakfast">${breakfast.m}</div>
            <div class="meal-actions">
              <button class="swap-btn" onclick="swapMeal(${i},'breakfast')">🔄 Swap</button>
              <button class="shop-btn" onclick="addToShop(${i},'breakfast')">🛒 Add ingredients</button>
            </div>
            <div class="added-flash" id="flash-${i}-breakfast"></div>
          </div>
        </div>
        <div class="meal-row">
          <span class="meal-label">Lunch${isWork ? '<span class="work-tag">work</span>' : ''}</span>
          <div style="flex:1">
            <div class="meal-text" id="meal-${i}-lunch">
              ${lunch.m}${isWork ? `<div class="lunch-sides">${WORK_SIDES}</div>` : ''}
            </div>
            <div class="meal-actions">
              <button class="swap-btn" onclick="swapMeal(${i},'lunch')">🔄 Swap</button>
              <button class="shop-btn" onclick="addToShop(${i},'lunch')">🛒 Add ingredients</button>
            </div>
            <div class="added-flash" id="flash-${i}-lunch"></div>
          </div>
        </div>
        <div class="meal-row">
          <span class="meal-label">Dinner</span>
          <div style="flex:1">
            <div class="meal-text" id="meal-${i}-dinner">${dinner.m}</div>
            <div class="meal-actions">
              <button class="swap-btn" onclick="swapMeal(${i},'dinner')">🔄 Swap</button>
              <button class="shop-btn" onclick="addToShop(${i},'dinner')">🛒 Add ingredients</button>
            </div>
            <div class="added-flash" id="flash-${i}-dinner"></div>
          </div>
        </div>
      </div>`;
  });

  html += `
    <button class="btn-copy" onclick="copyPlan()">📋 Copy meal plan</button>
    <div class="copied-msg" id="copied">✓ Copied! Paste it into a text message.</div>
    <p class="note">🔄 Swap any meal • 🛒 Add ingredients to shopping list</p>
    <p class="saved-badge">Plan saved — will be here when you come back</p>`;

  planEl.innerHTML = html;
  renderShopList();
}

function swapMeal(dayIndex, mealType) {
  const isWork = WORK_DAYS.includes(dayIndex);
  let picked;
  if (mealType === 'breakfast') picked = pick(BREAKFAST);
  else if (mealType === 'lunch') picked = pick(isWork ? WORK_LUNCH : WEEKEND_LUNCH);
  else picked = pick(DINNER);

  currentPlan[dayIndex][mealType] = picked;
  savePlan();

  const el = document.getElementById(`meal-${dayIndex}-${mealType}`);
  if (el) {
    if (mealType === 'lunch' && isWork) {
      el.innerHTML = picked.m + `<div class="lunch-sides">${WORK_SIDES}</div>`;
    } else {
      el.textContent = picked.m;
    }
  }
}

function addToShop(dayIndex, mealType) {
  const meal = currentPlan[dayIndex][mealType];
  if (!meal) return;
  const ingredients = meal.i || [];
  let list = getList();
  let added = 0;
  ingredients.forEach(item => {
    if (!list.find(l => l.name.toLowerCase() === item.toLowerCase())) {
      list.push({ name: item, checked: false });
      added++;
    }
  });
  saveList(list);
  renderShopList();

  const flash = document.getElementById(`flash-${dayIndex}-${mealType}`);
  if (flash) {
    flash.textContent = added > 0 ? `✓ ${added} item${added>1?'s':''} added` : '✓ Already in list';
    flash.style.display = 'block';
    setTimeout(() => flash.style.display = 'none', 2000);
  }
}

function generate() {
  const breakfasts = pickUnique(BREAKFAST, 7);
  const dinners = pickUnique(DINNER, 7);
  currentPlan = [];

  DAYS.forEach((day, i) => {
    const isWork = WORK_DAYS.includes(i);
    const lunch = pick(isWork ? WORK_LUNCH : WEEKEND_LUNCH);
    currentPlan.push({ breakfast: breakfasts[i], lunch, dinner: dinners[i], isWork });
  });

  savePlan();
  renderPlan();
  window.scrollTo({ top: document.querySelector('#plan').offsetTop - 10, behavior: 'smooth' });
}

function copyPlan() {
  let text = "FINN'S MEAL PLAN FOR THE WEEK\n\n";
  currentPlan.forEach((day, i) => {
    text += `${DAYS[i].toUpperCase()}\n`;
    text += `  Breakfast: ${day.breakfast.m}\n`;
    text += `  Lunch: ${day.lunch.m}\n`;
    if (day.isWork) text += `  (Pack: yogurt cup + fruit + carrots + hard boiled egg)\n`;
    text += `  Dinner: ${day.dinner.m}\n\n`;
  });
  text += 'Portions: ~8oz of protein per meal. Low carb — swap white rice for cauliflower rice. Season however you like!';

  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copied');
    if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 3000); }
  }).catch(() => alert('Copy failed — screenshot the plan instead!'));
}

// ── Shopping list ─────────────────────────────────────────
function getList() {
  try { return JSON.parse(localStorage.getItem('meal_shop') || '[]'); } catch { return []; }
}

function saveList(list) {
  localStorage.setItem('meal_shop', JSON.stringify(list));
}

function toggleItem(index) {
  const list = getList();
  if (list[index]) list[index].checked = !list[index].checked;
  saveList(list);
  renderShopList();
}

function clearChecked() {
  const list = getList().filter(item => !item.checked);
  saveList(list);
  renderShopList();
}

function clearList() {
  saveList([]);
  renderShopList();
}

function copyList() {
  const list = getList();
  if (list.length === 0) return;
  const unchecked = list.filter(i => !i.checked);
  const checked = list.filter(i => i.checked);
  let text = 'GROCERY LIST\n\n';
  unchecked.forEach(i => text += `• ${i.name}\n`);
  if (checked.length > 0) {
    text += `\n(Already have)\n`;
    checked.forEach(i => text += `✓ ${i.name}\n`);
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy-list');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = orig, 2000);
    }
  }).catch(() => alert('Copy failed — screenshot the list instead!'));
}

function renderShopList() {
  const section = document.getElementById('shopping-section');
  const container = document.getElementById('shop-list');
  const list = getList();

  if (list.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  container.innerHTML = list.map((item, i) => `
    <div class="shop-item ${item.checked ? 'checked' : ''}" onclick="toggleItem(${i})">
      <div class="shop-check">${item.checked ? '✓' : ''}</div>
      <span class="shop-item-name">${item.name}</span>
    </div>
  `).join('');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ── On load: restore saved plan + shopping list ───────────
const saved = loadSavedPlan();
if (saved && saved.length === 7) {
  currentPlan = saved;
  renderPlan();
}
renderShopList();
</script>
</body>
</html>
