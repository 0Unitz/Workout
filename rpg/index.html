<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="0; url=../">
<title>RPME moved</title>
<script>
  // RPME now lives at the site root. Forward there (localStorage is shared
  // across the whole origin, so no data is lost). Also drop the old /rpg/
  // service worker so this redirect isn't shadowed by a cached app copy.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { if (r.scope.indexOf('/rpg/') !== -1) r.unregister(); });
    });
  }
  location.replace('../');
</script>
</head>
<body>
  <p>RPME has moved. <a href="../">Tap here if you aren't redirected.</a></p>
</body>
</html>
